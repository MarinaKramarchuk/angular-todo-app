<div class="todoapp">
  <h1 class="todoapp__title">todos</h1>

  <div class="todoapp__content">
    <header class="todoapp__header">
      <button type="button" class="todoapp__toggle-all active" ></button>

      <app-todo-form (add)="addTodo($event)" />
    </header>

    <section class="todoapp__main">
      @for (todo of filteredTodos(); track todo.id) {
        <app-todo
          [todo]="todo"
          (toggle)="toggleTodoCompletion($event)"
          (delete)="deleteTodo($event)"
          (update)="updateTodoTitle($event)"
        />
      }
    </section>

    <footer class="todoapp__footer">
      <span class="todo-count"> {{ activeCount() }} items left </span>

      <nav class="filter">
        <a
          href="#/"
          class="filter__link"
          [class.selected]="filter() === 'all'"
          (click)="setFilter('all')"
        >
          All
        </a>

        <a
          href="#/active"
          class="filter__link"
          [class.selected]="filter() === 'active'"
          (click)="setFilter('active')"
        >
          Active
        </a>

        <a
          href="#/completed"
          class="filter__link"
          [class.selected]="filter() === 'completed'"
          (click)="setFilter('completed')"
        >
          Completed
        </a>
      </nav>

      <button type="button" class="todoapp__clear-completed" (click)="clearCompleted()">Clear completed</button>
    </footer>
  </div>

<app-error-message [message]="errorMessage()" (close)="errorMessage.set(null)" >

</app-error-message>
</div>
