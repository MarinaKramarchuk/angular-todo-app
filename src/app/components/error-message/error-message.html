<div class="notification is-danger is-light has-text-weight-normal" [class.hidden]="hidden()">
  <div class="message-header">
    <p>{{ title }}</p>
    <button type="button" class="delete" (click)="hidden.set(true)"></button>
  </div>
  <div class="message-body">
    {{ message() }}
  </div>
</div>
